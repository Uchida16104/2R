version: "3.9"

services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 2r_laravel
    restart: unless-stopped
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: reservations
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      APP_KEY: base64:2FL+tumrHbzjMhKiWbXyqnNpq4RuFJiFr9rLGJFmFZQ=
      APP_ENV: production
      APP_DEBUG: "false"
    ports:
      - "8000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 2r_net

  nginx:
    image: nginx:alpine
    container_name: 2r_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend/laravel_2r:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - 2r_net

  postgres:
    image: postgres:16-alpine
    container_name: 2r_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reservations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - 2r_net

  auth_rust:
    build:
      context: ./microservices/auth_rust
      dockerfile: Dockerfile
    container_name: 2r_auth_rust
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://postgres:secret@postgres:5432/reservations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 2r_net

  booking_dotnet:
    build:
      context: ./microservices/booking_dotnet
      dockerfile: Dockerfile
    container_name: 2r_booking_dotnet
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      ConnectionStrings__Default: Host=postgres;Database=reservations;Username=postgres;Password=secret
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 2r_net

  analytics_python:
    build:
      context: ./microservices/analytics_python
      dockerfile: Dockerfile
    container_name: 2r_analytics_python
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/reservations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 2r_net

  perf_cpp:
    build:
      context: ./microservices/perf_cpp
      dockerfile: Dockerfile
    container_name: 2r_perf_cpp
    restart: unless-stopped
    ports:
      - "9001:9001"
    networks:
      - 2r_net

  sys_zig:
    build:
      context: ./microservices/sys_zig
      dockerfile: Dockerfile
    container_name: 2r_sys_zig
    restart: unless-stopped
    ports:
      - "9002:9002"
    networks:
      - 2r_net

volumes:
  postgres_data:

networks:
  2r_net:
    driver: bridge
